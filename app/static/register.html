<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Motor-Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1a1a2e;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .auth-box {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }
    h1 { font-size: 24px; margin-bottom: 6px; }
    .sub { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    input, select {
      width: 100%;
      height: 42px;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    input:focus, select:focus { border-color: #4f46e5; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { margin-bottom: 16px; }
    button {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .notice {
      display: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .notice.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .notice.success {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }
    .footer {
      margin-top: 18px;
      text-align: center;
      color: #64748b;
      font-size: 13px;
    }
    a { color: #4f46e5; font-weight: 700; text-decoration: none; }
    @media (max-width: 440px) {
      .row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>
  <main class="auth-box">
    <h1>สมัครสมาชิก</h1>
    <p class="sub">สร้างบัญชี Motor-Agent</p>

    <div id="notice" class="notice"></div>

    <form id="register-form">
      <div class="field">
        <label for="name">ชื่อ</label>
        <input id="name" name="name" required />
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" minlength="3" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required />
      </div>
      <div class="row">
        <div class="field">
          <label for="age">อายุ</label>
          <input id="age" name="age" type="number" min="1" />
        </div>
        <div class="field">
          <label for="gender">เพศ</label>
          <select id="gender" name="gender" required>
            <option value="1">ชาย</option>
            <option value="2">หญิง</option>
          </select>
        </div>
      </div>
      <button id="submit-btn" type="submit">Register</button>
    </form>

    <div class="footer">
      มีบัญชีแล้ว? <a href="/login.html">เข้าสู่ระบบ</a>
    </div>
  </main>

  <script>
    const form = document.getElementById('register-form');
    const notice = document.getElementById('notice');
    const submitBtn = document.getElementById('submit-btn');

    function showNotice(message, type) {
      notice.textContent = message;
      notice.className = `notice ${type}`;
      notice.style.display = 'block';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      notice.style.display = 'none';
      submitBtn.disabled = true;

      const age = form.age.value ? Number(form.age.value) : null;

      try {
        const res = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: form.username.value.trim(),
            password: form.password.value,
            name: form.name.value.trim(),
            age,
            gender: Number(form.gender.value),
          }),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || 'Register failed');
        }

        showNotice('สมัครสำเร็จ กำลังไปหน้า Login...', 'success');
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 900);
      } catch (err) {
        showNotice(err.message || 'สมัครสมาชิกไม่สำเร็จ', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
