<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Motor-Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1a1a2e;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .auth-box {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }
    h1 { font-size: 24px; margin-bottom: 6px; }
    .sub { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      height: 42px;
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #4f46e5; }
    .field { margin-bottom: 16px; }
    button {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .error {
      display: none;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .footer {
      margin-top: 18px;
      text-align: center;
      color: #64748b;
      font-size: 13px;
    }
    a { color: #4f46e5; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <main class="auth-box">
    <h1>เข้าสู่ระบบ</h1>
    <p class="sub">Motor-Agent</p>

    <div id="error" class="error"></div>

    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button id="submit-btn" type="submit">Login</button>
    </form>

    <div class="footer">
      ยังไม่มีบัญชี? <a href="/register.html">สมัครสมาชิก</a>
    </div>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error');
    const submitBtn = document.getElementById('submit-btn');

    function getStoredTokenExpiresAtMs() {
      const expiresAt = localStorage.getItem('token_expires_at');
      const parsedExpiresAt = expiresAt ? new Date(expiresAt).getTime() : NaN;
      if (!Number.isNaN(parsedExpiresAt)) return parsedExpiresAt;

      const token = localStorage.getItem('access_token');
      if (!token) return null;

      try {
        let payloadSegment = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        payloadSegment += '='.repeat((4 - payloadSegment.length % 4) % 4);
        const payload = JSON.parse(atob(payloadSegment));
        return typeof payload.exp === 'number' ? payload.exp * 1000 : null;
      } catch {
        return null;
      }
    }

    if (localStorage.getItem('access_token')) {
      const expiresAtMs = getStoredTokenExpiresAtMs();
      if (expiresAtMs && Date.now() < expiresAtMs) {
        window.location.href = '/';
      } else {
        localStorage.removeItem('access_token');
        localStorage.removeItem('token_expires_at');
        localStorage.removeItem('user_id');
        localStorage.removeItem('username');
      }
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.style.display = 'none';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: form.username.value.trim(),
            password: form.password.value,
          }),
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || 'Login failed');
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('token_expires_at', data.expires_at);
        localStorage.setItem('user_id', data.user_id);
        localStorage.setItem('username', data.username);
        window.location.href = '/';
      } catch (err) {
        showError(err.message || 'ไม่สามารถเข้าสู่ระบบได้');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
