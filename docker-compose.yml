services:
  postgres:
    image: postgres:16
    container_name: motorai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - motorai_postgres_data:/var/lib/postgresql/data

volumes:
  motorai_postgres_data: